services:
  - type: web
    name: retainly-backend
    env: python
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt && python scripts/make_unlabeled_demo.py && python scripts/train_pretrained_model.py
    startCommand: PYTHONPATH=backend uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: CORS_ORIGINS
        value: https://retainlyfrontendfron.onrender.com,http://localhost:5173,http://127.0.0.1:5173
      - key: CORS_ORIGIN_REGEX
        value: https://.*\.onrender\.com
  - type: web
    name: retainly-frontend
    env: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20.15.0
      - key: VITE_API_BASE_URL
        value: https://retainly-ztaj.onrender.com/api
